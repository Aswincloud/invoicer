<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Invoicer — create invoices easily</title>
<meta name="description" content="Create, preview, download and email professional invoices in seconds.">
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="icon" href="/favicon.ico" sizes="48x48">
<link rel="icon" href="/favicon-32.png" type="image/png" sizes="32x32">
<link rel="icon" href="/favicon-16.png" type="image/png" sizes="16x16">
<link rel="apple-touch-icon" href="/apple-touch-icon.png">
<meta name="theme-color" content="#0b1120">
<link rel="stylesheet" href="/styles.css">
</head>
<body>
<header class="topbar no-print">
  <div class="topbar-in">
    <div class="logo-wrap"><span class="logo">₹</span><b>Invoicer</b></div>
    <div class="actions">
      <span id="who" class="who"></span>
      <button id="btnTheme" class="btn ghost icon-btn" title="Toggle light / dark" aria-label="Toggle theme">◐</button>
      <button id="btnSettings" class="btn ghost icon-btn" title="Default settings" aria-label="Settings" hidden>⚙</button>
      <button id="btnAuth" class="btn ghost" title="Sign in to save & email">Sign in</button>
      <button id="btnReset" class="btn ghost" title="Start a new blank invoice">New</button>
      <button id="btnSave" class="btn ghost" title="Save to your account" hidden>Save</button>
      <button id="btnEmail" class="btn ghost" title="Email this invoice to the client" hidden>Email</button>
      <button id="btnPrint" class="btn primary" title="Download / print as PDF">Download PDF</button>
    </div>
  </div>
</header>

<main class="layout">
  <!-- ────── FORM ────── -->
  <section class="form no-print" aria-label="Invoice editor">
    <details open class="grp">
      <summary>Your business <span class="hint">(saved on this device)</span></summary>
      <div class="grid2">
        <label>Business name<input id="bizName" placeholder="Aswin Cloud Labs"></label>
        <label>Email<input id="bizEmail" type="email" placeholder="billing@aswincloud.com"></label>
        <label class="col2">Address<textarea id="bizAddr" rows="2" placeholder="Puducherry, India"></textarea></label>
        <label>Phone<input id="bizPhone" placeholder="+91 90000 00000"></label>
        <label>GSTIN / Tax ID<input id="bizGst" placeholder="34ABCDE1234F1Z9"></label>
        <label class="col2">Payment details<textarea id="bizPay" rows="2" placeholder="A/C 1234… · IFSC … · UPI aswincloud@hdfcbank"></textarea></label>
      </div>
    </details>

    <details open class="grp">
      <summary>Bill to</summary>
      <div class="grid2">
        <label>Client name<input id="clName" placeholder="Nova Retail Pvt. Ltd."></label>
        <label>Client email<input id="clEmail" type="email" placeholder="priya@novaretail.com"></label>
        <label class="col2">Client address<textarea id="clAddr" rows="2" placeholder="14 MG Road, Bengaluru 560001"></textarea></label>
        <label>Client GSTIN<input id="clGst" placeholder="29ABCDE1234F1Z5"></label>
      </div>
    </details>

    <details open class="grp">
      <summary>Invoice details</summary>
      <div class="grid2">
        <label>Invoice #<input id="invNo" placeholder="INV-2026-0042"></label>
        <label>Currency<select id="currency">
          <option value="₹">₹ INR</option><option value="$">$ USD</option>
          <option value="€">€ EUR</option><option value="£">£ GBP</option><option value="">(none)</option>
        </select></label>
        <label>Issue date<input id="issueDate" type="date"></label>
        <label>Due date<input id="dueDate" type="date"></label>
      </div>
    </details>

    <details open class="grp">
      <summary>Line items</summary>
      <div id="items"></div>
      <button id="btnAddItem" class="btn ghost sm">+ Add line item</button>
    </details>

    <details open class="grp">
      <summary>Totals &amp; tax</summary>
      <div class="grid2">
        <label>Discount %<input id="discount" type="number" min="0" max="100" step="0.01" value="0"></label>
        <label>Tax mode<select id="taxMode">
          <option value="gst">CGST + SGST (split)</option>
          <option value="single">Single tax (e.g. IGST/VAT)</option>
          <option value="none">No tax</option>
        </select></label>
        <label>Tax rate %<input id="taxRate" type="number" min="0" max="100" step="0.01" value="18"></label>
        <label>Status<select id="status">
          <option>UNPAID</option><option>PAID</option><option>DUE</option><option>DRAFT</option>
        </select></label>
        <label class="col2">Notes / terms<textarea id="notes" rows="2" placeholder="Net 14 days. Thank you for your business!"></textarea></label>
      </div>
    </details>
  </section>

  <!-- ────── LIVE PREVIEW ────── -->
  <section class="preview-wrap" aria-label="Invoice preview">
    <div id="paper" class="paper"><!-- rendered by app.js --></div>
  </section>
</main>

<!-- ────── SIGN-IN MODAL ────── -->
<div id="authModal" class="modal-scrim no-print" hidden>
  <div class="modal" role="dialog" aria-modal="true" aria-labelledby="authTitle">
    <div class="modal-head">
      <div>
        <h3 id="authTitle">Sign in to Invoicer</h3>
        <p class="sub">Save invoices &amp; email them to clients.</p>
      </div>
      <button class="close" id="authClose" aria-label="Close">×</button>
    </div>

    <div id="ssoButtons" class="sso"><!-- provider buttons injected by app.js --></div>

    <div class="divider" id="ssoDivider" hidden>or</div>

    <label>Email
      <input id="magicEmail" type="email" placeholder="you@company.com" autocomplete="email">
    </label>
    <button id="magicSend" class="btn primary" style="width:100%;margin-top:10px;justify-content:center">Email me a sign-in link</button>
    <div id="authMsg" class="msg" role="status" aria-live="polite"></div>
  </div>
</div>

<!-- ────── SETTINGS MODAL (defaults for logged-in users) ────── -->
<div id="setModal" class="modal-scrim no-print" hidden>
  <div class="modal modal-lg" role="dialog" aria-modal="true" aria-labelledby="setTitle">
    <div class="modal-head">
      <div>
        <h3 id="setTitle">Default settings</h3>
        <p class="sub">Saved to your account and pre-filled on every new invoice.</p>
      </div>
      <button class="close" id="setClose" aria-label="Close">×</button>
    </div>

    <div class="set-section">Business profile</div>
    <div class="grid2">
      <label>Business name<input id="setBizName" placeholder="Aswin Cloud Labs"></label>
      <label>Email<input id="setBizEmail" type="email" placeholder="billing@aswincloud.com"></label>
      <label class="col2">Address<textarea id="setBizAddr" rows="2"></textarea></label>
      <label>Phone<input id="setBizPhone"></label>
      <label>GSTIN / Tax ID<input id="setBizGst"></label>
      <label class="col2">Payment details<textarea id="setBizPay" rows="2"></textarea></label>
    </div>

    <div class="set-section">Invoice defaults</div>
    <div class="grid2">
      <label>Currency<select id="setCurrency">
        <option value="">— none —</option><option value="₹">₹ INR</option><option value="$">$ USD</option>
        <option value="€">€ EUR</option><option value="£">£ GBP</option>
      </select></label>
      <label>Invoice # prefix<input id="setPrefix" placeholder="INV"></label>
      <label>Tax mode<select id="setTaxMode">
        <option value="">— none —</option><option value="gst">CGST + SGST</option>
        <option value="single">Single tax</option><option value="none">No tax</option>
      </select></label>
      <label>Tax rate %<input id="setTaxRate" type="number" min="0" max="100" step="0.01" placeholder="18"></label>
      <label>Discount %<input id="setDiscount" type="number" min="0" max="100" step="0.01" placeholder="0"></label>
      <label>Due in (days)<input id="setDueDays" type="number" min="0" step="1" placeholder="14"></label>
      <label class="col2">Default notes / terms<textarea id="setNotes" rows="2" placeholder="Net 14 days. Thank you!"></textarea></label>
    </div>

    <div class="set-actions">
      <button id="setSave" class="btn primary">Save settings</button>
      <span id="setMsg" class="msg" role="status" aria-live="polite"></span>
    </div>
  </div>
</div>

<script src="/app.js"></script>
</body>
</html>
