name = "invoicer"
main = "src/index.js"
compatibility_date = "2026-07-01"

# Static site served from ./public; Worker handles /api/* (non-asset paths).
[assets]
directory = "./public"
binding = "ASSETS"

[[d1_databases]]
binding = "DB"
database_name = "invoicer-db"
database_id = "ae270cfe-35e1-49cb-8bfb-fa8ed878c2b7"

[vars]
APP_NAME = "Invoicer"
RESEND_FROM_EMAIL = "notify@aswincloud.com"
APP_BASE_URL = "https://invoices.aswincloud.com"

# Secrets (NOT here — set once via API/dashboard, never committed):
#   RESEND_API_KEY, AUTH_SIGNING_KEY
